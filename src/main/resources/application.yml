spring:
  application:
    name: ai-creator
  profiles:
    active: dev # ????????
  session:
    store-type: redis
    # session 30 ??
    timeout: 2592000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        # cookie 30??
        max-age: 592000
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.hex.aicreator.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# 文章智能体配置
article:
  agent:
    # true: 使用StateGraph
    # false: 使用原有的ArticleAgentService
    useGraph: true
    # Agent 最大迭代次数
    max-iterations: 10

